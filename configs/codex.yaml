# Добавьте нужный вариант в ~/.codex/config.yaml

# Вариант 1 — установка прямо из GitHub через uvx (рекомендуется)
mcpServers:
  1c-price:
    command: uvx
    args:
      - --from
      - git+https://github.com/snn02/1c-products-price
      - mcp-1c-price

